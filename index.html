<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Global Offshore Installation Database</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e3a5f;
    --accent: #0ea5e9;
    --accent2: #38bdf8;
    --text: #e2e8f0;
    --muted: #64748b;
    --norway: #ef4444;
    --uk: #3b82f6;
    --denmark: #f59e0b;
    --netherlands: #f97316;
    --usa: #8b5cf6;
    --other: #10b981;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #0a1628 0%, #0f2040 50%, #071020 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 28px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 1000;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), #0369a1); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .logo-text h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.02em; }
  .logo-text p { font-size: 12px; color: var(--muted); }
  .header-stats { display: flex; gap: 24px; }
  .hstat { text-align: right; }
  .hstat-n { font-size: 22px; font-weight: 700; color: var(--accent2); }
  .hstat-l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 4px; padding: 16px 28px 0; border-bottom: 1px solid var(--border); background: var(--surface); }
  .tab { padding: 10px 20px; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--muted); border: 1px solid transparent; border-bottom: none; transition: all .2s; }
  .tab:hover { color: var(--text); background: var(--surface2); }
  .tab.active { color: var(--accent2); background: var(--bg); border-color: var(--border); border-bottom-color: var(--bg); }

  /* ── Main ── */
  main { padding: 24px 28px; }

  /* ── Stats cards ── */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .stat-icon { width: 42px; height: 42px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .stat-num { font-size: 26px; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 3px; }

  /* Country breakdown */
  .country-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .country-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px;
    border-left: 3px solid var(--accent);
  }
  .country-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .country-count { font-size: 22px; font-weight: 700; color: var(--accent2); }
  .country-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: 6px; }
  .country-bar-fill { height: 100%; border-radius: 2px; transition: width .6s ease; }

  /* ── Filters ── */
  .filter-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    margin-bottom: 16px;
  }
  .filter-bar input, .filter-bar select {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 8px 12px; font-size: 14px;
    outline: none; transition: border-color .2s;
  }
  .filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
  .filter-bar input[type=text] { flex: 1; min-width: 200px; }
  .filter-bar select { min-width: 140px; }
  .btn {
    padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: 1px solid; transition: all .2s;
  }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: var(--surface2); position: sticky; top: 0; }
  th {
    padding: 12px 14px; text-align: left; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted);
    cursor: pointer; user-select: none; white-space: nowrap;
    border-bottom: 1px solid var(--border); transition: color .2s;
  }
  th:hover { color: var(--accent2); }
  th.sorted { color: var(--accent2); }
  th .sort-icon { margin-left: 4px; opacity: .5; }
  th.sorted .sort-icon { opacity: 1; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 10px 14px; vertical-align: middle; }
  td.name { font-weight: 500; color: var(--text); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .badge-active   { background: #052e16; color: #4ade80; border: 1px solid #166534; }
  .badge-decomm   { background: #1c1917; color: #a8a29e; border: 1px solid #44403c; }
  .badge-unknown  { background: #1e1b4b; color: #a5b4fc; border: 1px solid #312e81; }
  .country-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .pager { display: flex; align-items: center; gap: 10px; padding: 14px; justify-content: flex-end; background: var(--surface); border-top: 1px solid var(--border); font-size: 13px; color: var(--muted); }
  .pager button { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 5px; padding: 5px 12px; cursor: pointer; font-size: 13px; }
  .pager button:disabled { opacity: .4; cursor: not-allowed; }
  .pager button:not(:disabled):hover { border-color: var(--accent); }

  /* ── Map ── */
  #map { height: 600px; border-radius: 10px; border: 1px solid var(--border); }
  .leaflet-popup-content-wrapper { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; }
  .leaflet-popup-tip { background: var(--surface2); }
  .popup-name { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .popup-row { font-size: 12px; color: var(--muted); margin: 2px 0; }
  .popup-row span { color: var(--text); }

  /* ── Loading ── */
  .loading { display: flex; align-items: center; justify-content: center; min-height: 300px; flex-direction: column; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Tabs ── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Legend ── */
  .map-legend { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    header { flex-direction: column; gap: 12px; }
    .header-stats { gap: 16px; }
    main { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🛢️</div>
    <div class="logo-text">
      <h1>Offshore Installation Database</h1>
      <p>Global registry · Norway · UK · Denmark · Netherlands · USA</p>
    </div>
  </div>
  <div class="header-stats">
    <div class="hstat">
      <div class="hstat-n" id="hTotal">—</div>
      <div class="hstat-l">Total installations</div>
    </div>
    <div class="hstat">
      <div class="hstat-n" id="hCountries">—</div>
      <div class="hstat-l">Countries</div>
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('dashboard')">📊 Dashboard</div>
  <div class="tab" onclick="switchTab('table')">📋 Table</div>
  <div class="tab" onclick="switchTab('map')">🗺️ Map</div>
</div>

<main>
  <!-- ── DASHBOARD ── -->
  <div id="tab-dashboard" class="tab-panel active">
    <div id="statsGrid" class="stats-grid"></div>
    <h3 style="font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;">Breakdown by country</h3>
    <div id="countryGrid" class="country-grid"></div>
    <h3 style="font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;margin-top:24px;">Installation types (top 10)</h3>
    <div id="typeGrid" class="country-grid"></div>
  </div>

  <!-- ── TABLE ── -->
  <div id="tab-table" class="tab-panel">
    <div class="filter-bar">
      <input type="text" id="searchInput" placeholder="🔍  Search by name, country, type…" oninput="applyFilters()"/>
      <select id="filterCountry" onchange="applyFilters()">
        <option value="">All countries</option>
      </select>
      <select id="filterStatus" onchange="applyFilters()">
        <option value="">All statuses</option>
        <option value="Active">Active</option>
        <option value="Decommissioned">Decommissioned</option>
        <option value="Inactive/Decommissioned">Inactive / Decommissioned</option>
        <option value="Unknown">Unknown</option>
      </select>
      <select id="filterType" onchange="applyFilters()">
        <option value="">All types</option>
      </select>
      <button class="btn btn-ghost" onclick="clearFilters()">Clear</button>
      <button class="btn btn-primary" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
    <div id="resultCount" style="font-size:12px;color:var(--muted);margin-bottom:10px;"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('installation_name')">Name <span class="sort-icon" id="sort-installation_name"></span></th>
            <th onclick="sortBy('country')">Country <span class="sort-icon" id="sort-country"></span></th>
            <th onclick="sortBy('region')">Region <span class="sort-icon" id="sort-region"></span></th>
            <th onclick="sortBy('installation_type')">Type <span class="sort-icon" id="sort-installation_type"></span></th>
            <th onclick="sortBy('operator')">Operator <span class="sort-icon" id="sort-operator"></span></th>
            <th onclick="sortBy('status')">Status <span class="sort-icon" id="sort-status"></span></th>
            <th onclick="sortBy('year_installed')">Year <span class="sort-icon" id="sort-year_installed"></span></th>
            <th>Source</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="pager">
        <span id="pageInfo"></span>
        <button id="prevBtn" onclick="prevPage()">← Prev</button>
        <button id="nextBtn" onclick="nextPage()">Next →</button>
      </div>
    </div>
  </div>

  <!-- ── MAP ── -->
  <div id="tab-map" class="tab-panel">
    <div id="map"></div>
    <div class="map-legend" id="mapLegend"></div>
  </div>
</main>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let allData = [];
let filtered = [];
let sortCol = 'installation_name';
let sortDir = 1;
let page = 0;
const PAGE_SIZE = 50;
let mapInited = false;
let leafletMap, markerLayer;

const COUNTRY_COLORS = {
  'Norway': '#ef4444',
  'United Kingdom': '#3b82f6',
  'Denmark': '#f59e0b',
  'Netherlands': '#f97316',
  'United States': '#8b5cf6',
};
function countryColor(c) { return COUNTRY_COLORS[c] || '#10b981'; }

// ── Load data ──────────────────────────────────────────────────────────────
fetch('global_offshore_inventory_local.json')
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(json => {
    allData = json.inventory || [];
    init();
  })
  .catch(err => {
    document.getElementById('tab-dashboard').innerHTML =
      `<div class="loading"><div style="color:#ef4444;font-size:32px;">⚠️</div>
       <div style="font-size:16px;font-weight:600;">Could not load data</div>
       <div style="color:var(--muted);font-size:13px;">Make sure <code>global_offshore_inventory_local.json</code> is in the same folder as this HTML file.</div>
       <div style="color:var(--muted);font-size:12px;max-width:420px;text-align:center;">Error: ${err.message}</div></div>`;
  });

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  filtered = [...allData];

  // Header stats
  const countries = new Set(allData.map(d => d.country)).size;
  document.getElementById('hTotal').textContent = allData.length.toLocaleString();
  document.getElementById('hCountries').textContent = countries;

  buildDashboard();
  buildFilterOptions();
  renderTable();
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function buildDashboard() {
  const active = allData.filter(d => d.status === 'Active').length;
  const decomm = allData.filter(d => ['Decommissioned','Inactive/Decommissioned'].includes(d.status)).length;
  const withCoords = allData.filter(d => d.latitude && d.longitude).length;
  const countries = [...new Set(allData.map(d => d.country))].length;

  document.getElementById('statsGrid').innerHTML = [
    { icon: '🛢️', num: allData.length.toLocaleString(), label: 'Total Installations', color: '#0ea5e9' },
    { icon: '✅', num: active.toLocaleString(), label: 'Active', color: '#22c55e' },
    { icon: '🔴', num: decomm.toLocaleString(), label: 'Decommissioned / Inactive', color: '#ef4444' },
    { icon: '🌍', num: countries, label: 'Countries', color: '#a78bfa' },
    { icon: '📍', num: withCoords.toLocaleString(), label: 'With coordinates', color: '#f59e0b' },
  ].map(s => `
    <div class="stat-card">
      <div class="stat-icon" style="background:${s.color}22;color:${s.color}">${s.icon}</div>
      <div><div class="stat-num" style="color:${s.color}">${s.num}</div><div class="stat-label">${s.label}</div></div>
    </div>`).join('');

  // Country breakdown
  const byCo = {};
  allData.forEach(d => { byCo[d.country] = (byCo[d.country] || 0) + 1; });
  const maxCo = Math.max(...Object.values(byCo));
  document.getElementById('countryGrid').innerHTML = Object.entries(byCo)
    .sort((a, b) => b[1] - a[1])
    .map(([c, n]) => `
      <div class="country-card" style="border-left-color:${countryColor(c)}">
        <div class="country-name">${c}</div>
        <div class="country-count" style="color:${countryColor(c)}">${n.toLocaleString()}</div>
        <div class="country-bar"><div class="country-bar-fill" style="width:${(n/maxCo*100).toFixed(0)}%;background:${countryColor(c)}"></div></div>
      </div>`).join('');

  // Type breakdown
  const byType = {};
  allData.forEach(d => { const t = d.installation_type || 'Unknown'; byType[t] = (byType[t] || 0) + 1; });
  const maxType = Math.max(...Object.values(byType));
  document.getElementById('typeGrid').innerHTML = Object.entries(byType)
    .sort((a, b) => b[1] - a[1]).slice(0, 10)
    .map(([t, n]) => `
      <div class="country-card" style="border-left-color:#0ea5e9">
        <div class="country-name" style="font-size:12px">${t}</div>
        <div class="country-count">${n.toLocaleString()}</div>
        <div class="country-bar"><div class="country-bar-fill" style="width:${(n/maxType*100).toFixed(0)}%;background:#0ea5e9"></div></div>
      </div>`).join('');
}

// ── Filters ─────────────────────────────────────────────────────────────────
function buildFilterOptions() {
  const countries = [...new Set(allData.map(d => d.country))].sort();
  const cSel = document.getElementById('filterCountry');
  countries.forEach(c => { const o = document.createElement('option'); o.value = o.textContent = c; cSel.appendChild(o); });

  const types = [...new Set(allData.map(d => d.installation_type).filter(Boolean))].sort();
  const tSel = document.getElementById('filterType');
  types.slice(0, 30).forEach(t => { const o = document.createElement('option'); o.value = o.textContent = t; tSel.appendChild(o); });
}

function applyFilters() {
  const q   = document.getElementById('searchInput').value.toLowerCase();
  const co  = document.getElementById('filterCountry').value;
  const st  = document.getElementById('filterStatus').value;
  const ty  = document.getElementById('filterType').value;

  filtered = allData.filter(d => {
    if (q  && !`${d.installation_name} ${d.country} ${d.installation_type} ${d.operator}`.toLowerCase().includes(q)) return false;
    if (co && d.country !== co) return false;
    if (st && d.status !== st) return false;
    if (ty && d.installation_type !== ty) return false;
    return true;
  });
  page = 0;
  renderTable();
}

function clearFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterCountry').value = '';
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterType').value = '';
  applyFilters();
}

// ── Sort ───────────────────────────────────────────────────────────────────
function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('.sort-icon').forEach(el => el.textContent = '');
  document.querySelectorAll('th').forEach(el => el.classList.remove('sorted'));
  const icon = document.getElementById('sort-' + col);
  if (icon) { icon.textContent = sortDir === 1 ? ' ↑' : ' ↓'; icon.closest('th').classList.add('sorted'); }

  filtered.sort((a, b) => {
    const av = a[col] ?? '', bv = b[col] ?? '';
    if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * sortDir;
    return String(av).localeCompare(String(bv)) * sortDir;
  });
  page = 0;
  renderTable();
}

// ── Table render ───────────────────────────────────────────────────────────
function renderTable() {
  const start = page * PAGE_SIZE, end = start + PAGE_SIZE;
  const rows = filtered.slice(start, end);

  document.getElementById('resultCount').textContent =
    `Showing ${Math.min(end, filtered.length).toLocaleString()} of ${filtered.length.toLocaleString()} installations`;

  document.getElementById('tableBody').innerHTML = rows.map(d => {
    const statusBadge = d.status === 'Active'
      ? `<span class="badge badge-active">● Active</span>`
      : ['Decommissioned','Inactive/Decommissioned'].includes(d.status)
      ? `<span class="badge badge-decomm">○ ${d.status}</span>`
      : `<span class="badge badge-unknown">? ${d.status || 'Unknown'}</span>`;

    const srcLabel = d.source_authority?.replace('Regulator (','').replace(')','') || '—';

    return `<tr>
      <td class="name" title="${esc(d.installation_name)}">${esc(d.installation_name)}</td>
      <td><span class="country-dot" style="background:${countryColor(d.country)}"></span> ${esc(d.country)}</td>
      <td style="color:var(--muted);font-size:12px">${esc(d.region)}</td>
      <td style="font-size:12px">${esc(d.installation_type || '—')}</td>
      <td style="color:var(--muted);font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(d.operator || '—')}</td>
      <td>${statusBadge}</td>
      <td style="color:var(--muted)">${d.year_installed || '—'}</td>
      <td style="font-size:11px;color:var(--muted)">${esc(srcLabel)}</td>
    </tr>`;
  }).join('');

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  document.getElementById('pageInfo').textContent = `Page ${page + 1} of ${totalPages || 1}`;
  document.getElementById('prevBtn').disabled = page === 0;
  document.getElementById('nextBtn').disabled = page >= totalPages - 1;
}

function prevPage() { if (page > 0) { page--; renderTable(); } }
function nextPage() { if ((page + 1) * PAGE_SIZE < filtered.length) { page++; renderTable(); } }
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Export CSV ─────────────────────────────────────────────────────────────
function exportCSV() {
  const cols = ['installation_name','country','region','installation_type','operator','status','year_installed','latitude','longitude','source_authority'];
  const header = cols.join(',');
  const rows = filtered.map(d => cols.map(c => {
    const v = d[c] ?? '';
    return String(v).includes(',') ? `"${v}"` : v;
  }).join(','));
  const blob = new Blob([header + '\n' + rows.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `offshore_installations_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── Map ────────────────────────────────────────────────────────────────────
function initMap() {
  if (mapInited) return;
  mapInited = true;

  leafletMap = L.map('map', { preferCanvas: true }).setView([55, 5], 4);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(leafletMap);

  markerLayer = L.layerGroup().addTo(leafletMap);
  renderMapMarkers();

  // Legend
  const countries = [...new Set(allData.map(d => d.country))];
  document.getElementById('mapLegend').innerHTML =
    countries.map(c => `<div class="legend-item"><div class="legend-dot" style="background:${countryColor(c)}"></div>${c}</div>`).join('') +
    '<div class="legend-item" style="margin-left:auto;color:var(--muted);font-size:11px">Only installations with coordinates shown</div>';
}

function renderMapMarkers() {
  if (!markerLayer) return;
  markerLayer.clearLayers();
  const withCoords = allData.filter(d => d.latitude && d.longitude);

  withCoords.forEach(d => {
    const col = countryColor(d.country);
    const marker = L.circleMarker([d.latitude, d.longitude], {
      radius: 5, fillColor: col, color: '#fff',
      weight: 0.5, fillOpacity: 0.85
    });
    marker.bindPopup(`
      <div class="popup-name">${d.installation_name}</div>
      <div class="popup-row">Country: <span>${d.country}</span></div>
      <div class="popup-row">Type: <span>${d.installation_type || '—'}</span></div>
      <div class="popup-row">Status: <span>${d.status || '—'}</span></div>
      <div class="popup-row">Operator: <span>${d.operator || '—'}</span></div>
      ${d.year_installed ? `<div class="popup-row">Installed: <span>${d.year_installed}</span></div>` : ''}
      <div class="popup-row">Source: <span>${d.source_authority || '—'}</span></div>
    `);
    markerLayer.addLayer(marker);
  });
}

// ── Tab switching ──────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['dashboard','table','map'][i] === name);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'map') setTimeout(initMap, 50);
  if (name === 'table') renderTable();
}
</script>
</body>
